name: Mirror to Codeberg

on: 
  workflow_dispatch:
  push:
    branches:
      - master
      - pages

permissions: {}

jobs:
  mirror:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  #6.0.2
      with:
        fetch-depth: 0
        persist-credentials: false
        
    - uses: yesolutions/mirror-action@1708f16cdb28634fd3ba10c5c79abc91f5578a14  #0.7.0
      with:
        REMOTE: ${{ secrets.CB_REMOTE }}
        GIT_USERNAME: ${{ secrets.CB_GIT_USERNAME }}
        GIT_PASSWORD: ${{ secrets.CB_GIT_PASSWORD }}
    
